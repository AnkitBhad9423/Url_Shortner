# render.yaml
services:
  - type: web
    name: url-shortener
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BASE_URL
        sync: false
