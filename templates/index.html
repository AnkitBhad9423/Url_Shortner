<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>snip.it — no cap, long URLs are cringe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0a;
        --bg2: #111111;
        --bg3: #1a1a1a;
        --border: rgba(255, 255, 255, 0.08);
        --border2: rgba(255, 255, 255, 0.14);
        --text: #f0f0f0;
        --text2: #888;
        --text3: #555;
        --accent: #e8ff47;
        --accent-bg: rgba(232, 255, 71, 0.08);
        --red: #ff5050;
        --red-bg: rgba(255, 80, 80, 0.08);
        --green: #4ade80;
        --green-bg: rgba(74, 222, 128, 0.08);
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        overflow-x: hidden;
      }

      /* noise grain overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.6;
      }

      /* animated grid bg */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.015) 1px,
            transparent 1px
          );
        background-size: 48px 48px;
        pointer-events: none;
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
        gap: 0;
      }

      /* top bar */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 2rem;
        border-bottom: 1px solid var(--border);
        background: rgba(10, 10, 10, 0.8);
        backdrop-filter: blur(12px);
        z-index: 10;
        animation: fadeDown 0.4s ease both;
      }

      .logo {
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--text);
      }

      .logo span {
        color: var(--accent);
      }

      .topbar-badge {
        font-size: 11px;
        font-weight: 500;
        color: var(--text3);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 3px 10px;
      }

      /* hero section */
      .hero {
        text-align: center;
        margin-bottom: 2.5rem;
        animation: fadeUp 0.5s ease 0.1s both;
      }

      .hero-label {
        display: inline-block;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent);
        background: var(--accent-bg);
        border: 1px solid rgba(232, 255, 71, 0.2);
        border-radius: 100px;
        padding: 4px 14px;
        margin-bottom: 1.25rem;
      }

      .hero h1 {
        font-size: clamp(2.4rem, 6vw, 4.5rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        color: var(--text);
        margin-bottom: 0.75rem;
      }

      .hero h1 .strike {
        position: relative;
        color: var(--text2);
      }

      .hero h1 .strike::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 52%;
        height: 3px;
        background: var(--red);
        border-radius: 2px;
        transform: rotate(-2deg);
      }

      .hero p {
        font-size: 15px;
        color: var(--text2);
        font-weight: 400;
        letter-spacing: 0.01em;
      }

      /* main card */
      .card {
        width: 100%;
        max-width: 580px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 1.75rem;
        display: flex;
        flex-direction: column;
        gap: 14px;
        animation: fadeUp 0.5s ease 0.2s both;
      }

      .input-row {
        display: flex;
        gap: 8px;
      }

      .url-input {
        flex: 1;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg3);
        color: var(--text);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        min-width: 0;
      }

      .url-input:focus {
        border-color: var(--border2);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
      }

      .url-input::placeholder {
        color: var(--text3);
      }

      .slay-btn {
        font-family: "Syne", sans-serif;
        font-size: 13px;
        font-weight: 700;
        padding: 12px 22px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #0a0a0a;
        cursor: pointer;
        white-space: nowrap;
        letter-spacing: -0.02em;
        transition:
          transform 0.15s,
          opacity 0.15s,
          box-shadow 0.15s;
        flex-shrink: 0;
      }

      .slay-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(232, 255, 71, 0.25);
      }

      .slay-btn:active {
        transform: scale(0.97);
      }
      .slay-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* error */
      .error-msg {
        font-size: 12px;
        color: var(--red);
        background: var(--red-bg);
        border: 1px solid rgba(255, 80, 80, 0.2);
        border-radius: 8px;
        padding: 9px 14px;
        display: none;
        font-family: "JetBrains Mono", monospace;
      }

      /* result */
      .result-box {
        display: none;
        flex-direction: column;
        gap: 14px;
      }

      .divider {
        height: 1px;
        background: var(--border);
      }

      .slang-pill {
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        color: var(--accent);
        background: var(--accent-bg);
        border: 1px solid rgba(232, 255, 71, 0.15);
        border-radius: 100px;
        padding: 7px 18px;
        letter-spacing: -0.01em;
      }

      .short-url-row {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 10px;
        padding: 12px 16px;
      }

      .short-url-text {
        flex: 1;
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        word-break: break-all;
        min-width: 0;
      }

      .copy-btn {
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 600;
        padding: 6px 14px;
        border-radius: 7px;
        border: 1px solid var(--border2);
        background: var(--bg2);
        color: var(--text);
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.15s;
        flex-shrink: 0;
      }

      .copy-btn:hover {
        border-color: var(--border2);
        background: var(--bg3);
      }

      .copy-btn.copied {
        color: var(--green);
        border-color: rgba(74, 222, 128, 0.3);
        background: var(--green-bg);
      }

      .meta-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .chip {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--text2);
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 3px 10px;
      }

      .actions-row {
        display: flex;
        gap: 8px;
      }

      .analytics-btn {
        flex: 1;
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: var(--text2);
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 14px;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: -0.01em;
      }

      .analytics-btn:hover {
        color: var(--text);
        border-color: var(--border2);
      }

      .another-btn {
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 400;
        color: var(--text3);
        background: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 14px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }

      .another-btn:hover {
        color: var(--text2);
        border-color: var(--border2);
      }

      /* stats bar */
      .stats-bar {
        display: flex;
        gap: 1px;
        width: 100%;
        max-width: 580px;
        animation: fadeUp 0.5s ease 0.3s both;
      }

      .stat-item {
        flex: 1;
        background: var(--bg2);
        border: 1px solid var(--border);
        padding: 10px 14px;
        text-align: center;
      }

      .stat-item:first-child {
        border-radius: 10px 0 0 10px;
      }
      .stat-item:last-child {
        border-radius: 0 10px 10px 0;
      }

      .stat-num {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.03em;
        font-family: "JetBrains Mono", monospace;
      }

      .stat-label {
        font-size: 10px;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 2px;
      }

      /* footer */
      .footer {
        margin-top: 1.5rem;
        font-size: 11px;
        color: var(--text3);
        text-align: center;
        line-height: 1.8;
        animation: fadeUp 0.5s ease 0.4s both;
      }

      .footer a {
        color: var(--text2);
        text-decoration: none;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1px;
      }

      /* spinner */
      .spinner {
        width: 13px;
        height: 13px;
        border: 2px solid rgba(10, 10, 10, 0.3);
        border-top-color: #0a0a0a;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 5px;
      }

      /* animations */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.95) translateY(6px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .result-box.visible {
        display: flex;
        animation: popIn 0.25s ease both;
      }

      /* responsive */
      @media (max-width: 480px) {
        .input-row {
          flex-direction: column;
        }
        .slay-btn {
          width: 100%;
        }
        .actions-row {
          flex-direction: column;
        }
        .topbar {
          padding: 0.85rem 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <div class="logo">snip<span>.</span>it</div>
      <span class="topbar-badge">Built with FastAPI · MongoDB · Redis</span>
    </nav>

    <main class="page">
      <div class="hero">
        <span class="hero-label">URL Shortener</span>
        <h1>Long URLs are <span class="strike">lowkey</span><br />not it.</h1>
        <p>Paste it. Shrink it. Send it. Periodt.</p>
      </div>

      <div class="card">
        <div class="input-row">
          <input
            class="url-input"
            id="urlInput"
            type="url"
            placeholder="https://your-painfully-long-url.com/goes/here/no/cap"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="slay-btn" id="shortenBtn" onclick="shortenUrl()">
            Slay it ✦
          </button>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="result-box" id="resultBox">
          <div class="divider"></div>
          <div class="slang-pill" id="slangText"></div>

          <div class="short-url-row">
            <span class="short-url-text" id="shortUrlText"></span>
            <button class="copy-btn" id="copyBtn" onclick="copyUrl()">
              Copy
            </button>
          </div>

          <div class="meta-row" id="metaRow"></div>

          <div class="actions-row">
            <button class="analytics-btn" id="analyticsBtn">
              View analytics ↗
            </button>
            <button class="another-btn" onclick="resetForm()">
              + another one
            </button>
          </div>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-num">302</div>
          <div class="stat-label">Redirect</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">Base62</div>
          <div class="stat-label">Encoding</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">Redis</div>
          <div class="stat-label">Cache</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">20/min</div>
          <div class="stat-label">Rate limit</div>
        </div>
      </div>

      <p class="footer">
        Rate limited · Malicious domains blocked · Geo analytics enabled<br />
        <a href="/docs" target="_blank">API docs</a> ·
        <a href="/health" target="_blank">Health check</a>
      </p>
    </main>

    <script>
      const BASE_URL = "https://url-shortner-88mk.onrender.com";

      const SLANGS = [
        "no cap, you're built different now ✦",
        "bestie that URL just had a glow up fr fr",
        "slay! your link is giving main character energy",
        "lowkey fire. that long URL is now deceased.",
        "it's giving sleek. share it before it's too mainstream",
        "periodt. your short URL era just started.",
        "not me obsessed with how clean this looks rn",
        "the short URL understood the assignment fr",
        "bussin bussin. that URL said less is more.",
        "that long URL? we don't know her anymore.",
        "you just ate and left no crumbs bestie",
        "this URL is so sigma it only needs 4 chars",
      ];

      let currentShortCode = "";

      async function shortenUrl() {
        const input = document.getElementById("urlInput");
        const btn = document.getElementById("shortenBtn");
        const errorMsg = document.getElementById("errorMsg");
        const resultBox = document.getElementById("resultBox");
        const url = input.value.trim();

        //errorMsg.style.display = "none";
        // resultBox.classList.remove("visible");
        //  resultBox.style.display = "none";

        if (!url) {
          showError("bestie... you forgot to paste the URL 💀");
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>slaying...';

        try {
          const res = await fetch(`${BASE_URL}/api/shorten`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ long_url: url }),
          });

          const data = await res.json();

          if (!res.ok) {
            const msg =
              res.status === 429
                ? "chill bestie, you're going too fast 🛑 rate limit hit"
                : res.status === 403
                  ? "yikes, that domain is on the blocklist 🚫"
                  : data.detail || "something flopped. try again bestie.";
            showError(msg);
            return;
          }

          currentShortCode = data.short_code;
          showResult(data);
        } catch (e) {
          showError("server is ghosting us rn 👻 try again in a sec.");
        } finally {
          btn.disabled = false;
          btn.innerHTML = "Slay it ✦";
        }
      }
      console.log(currentShortCode);

      function showResult(data) {
        const slang = SLANGS[Math.floor(Math.random() * SLANGS.length)];
        document.getElementById("slangText").textContent = slang;
        document.getElementById("shortUrlText").textContent = data.short_url;

        let hostname = "";
        try {
          hostname = new URL(data.long_url).hostname;
        } catch (_) {}

        const meta = document.getElementById("metaRow");
        meta.innerHTML = `
        <span class="chip">code: ${data.short_code}</span>
        ${hostname ? `<span class="chip">${hostname}</span>` : ""}
        <span class="chip">302 redirect</span>
      `;

        document.getElementById("analyticsBtn").onclick = () => {
          window.open(`${BASE_URL}/api/analytics/${data.short_code}`, "_blank");
        };

        const resultBox = document.getElementById("resultBox");
        resultBox.classList.add("visible");
      }

      function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
      }

      function copyUrl() {
        const url = document.getElementById("shortUrlText").textContent;
        const btn = document.getElementById("copyBtn");
        navigator.clipboard
          .writeText(url)
          .then(() => {
            btn.textContent = "Copied ✓";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.textContent = "Copy";
              btn.classList.remove("copied");
            }, 2000);
          })
          .catch(() => {
            // fallback for older browsers
            const ta = document.createElement("textarea");
            ta.value = url;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            btn.textContent = "Copied ✓";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.textContent = "Copy";
              btn.classList.remove("copied");
            }, 2000);
          });
      }

      function resetForm() {
        document.getElementById("urlInput").value = "";
        const resultBox = document.getElementById("resultBox");
        resultBox.classList.remove("visible");
        resultBox.style.display = "none";
        document.getElementById("errorMsg").style.display = "none";
        document.getElementById("urlInput").focus();
      }

      document.getElementById("urlInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") shortenUrl();
      });
    </script>
  </body>
</html>
